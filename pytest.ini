[pytest]
pythonpath = .

# Default command-line flags applied automatically on every run
addopts = 
    --cov=app 
    --cov=gui_app 
    --cov-report=term-missing 
    --cov-report=html
    --verbose

# Where pytest should look for test files
testpaths = tests

# Naming patterns for test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Registering markers to avoid annoying configuration warnings
markers =
    unit: Quick, isolated internal logic tests (e.g., parser logic).
    integration: Tests verifying routers or rendering pipelines.
    property: Hypothesis property-based testing suites.